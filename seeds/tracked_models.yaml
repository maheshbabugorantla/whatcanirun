# Models tracked by M03 (HF sync).
# Spec: spec/M03-hf-model-sync.md
# Loader: src/whatcanirun/catalog/loaders.py::load_tracked_models
#
# Schema (TrackedModelRow in src/whatcanirun/catalog/seed_schemas.py):
#   slug                         (str, required)   Joins ComputePrices /api/v1/llm-models
#   hf_repo_id                   (str, required)   Hugging Face repo identifier (namespace/name)
#   display_name                 (str, optional)   Human-friendly name; defaults to
#                                                  hf_repo_id's last segment when omitted
#   total_params_b               (float, optional) Total params in billions (from model card
#                                                  or safetensors index — HF config.json
#                                                  doesn't carry this). When null, M07 routes
#                                                  affected cells to `requires_measurement`
#                                                  per ADR-010 rather than fabricating a
#                                                  value (trust contract). Project seeds
#                                                  populate this; M09's user_models.yaml
#                                                  rows often leave it null.
#   active_params_b              (float, optional) Active params for MoE (None for dense)
#   kv_cache_strategy_override   (enum, optional)  standard_gqa | mla | sliding_window
#                                                  Overrides config-based auto-detection
#   notes                        (str, optional)   Free-form context
#
# Minimum valid row: just `slug` + `hf_repo_id`. That's the shape M09's
# `resolve_model` tool writes to `~/.config/whatcanirun/user_models.yaml`
# after eliciting only the slug + repo_id from the user (they don't
# know `total_params_b`). Project-controlled rows in THIS file should
# still populate `display_name` + `total_params_b` for precision —
# the optionality is for the per-user extension file.
#
# Spec target: 30 rows. v1 ships with 3 (one per family we have HF
# fixtures for); the other 27 are tracked as M04 carry-forward debt
# in spec/M07-tps-estimator.md § M04 carry-forward — M07's Tier-2
# routing is the consumer that actually needs the full set, so it
# owns the expansion work alongside picking a reasoning model with
# all three AA effort variants for the live-data smoke test.
# Adding rows here without also capturing the HF config fixture
# under tests/fixtures/ AND adding the matching aa_slug_mapping row
# would break the offline test suite — keep all three in lockstep.
---

# Llama family (standard GQA).
- slug: llama-3-3-70b
  hf_repo_id: meta-llama/Llama-3.3-70B-Instruct
  display_name: Llama 3.3 70B Instruct
  total_params_b: 70.6
  notes: "Hopper-era reference for standard GQA throughput."

# DeepSeek (MLA — special attention; auto-detected via DeepseekV3 family).
- slug: deepseek-v3
  hf_repo_id: deepseek-ai/DeepSeek-V3
  display_name: DeepSeek-V3
  total_params_b: 671.0
  active_params_b: 37.0
  notes: "256 routed experts, 8 active per token. Uses MLA, not standard GQA."

# Mixtral (MoE — sparse experts; standard GQA for attention).
- slug: mixtral-8x22b
  hf_repo_id: mistralai/Mixtral-8x22B-Instruct-v0.1
  display_name: Mixtral 8x22B Instruct v0.1
  total_params_b: 141.0
  active_params_b: 39.0
  notes: "8 experts per layer, 2 active per token."
