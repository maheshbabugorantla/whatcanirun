- cp_slug: qwen-2-5-14b
  aa_slugs: []
  investigation_note: "Confirmed absent on 2026-05-27 AA capture after exhaustive token-overlap re-audit. AA tracks qwen3-14b-instruct (Qwen 3, different family) and deepseek-r1-distill-qwen-14b (DeepSeek distillation) — neither matches the vanilla Qwen 2.5 14B Instruct."

- cp_slug: qwen-2-5-72b
  aa_slugs:
