      reasoning_effort: null
  investigation_note: "Re-audit caught: AA writes the slug WITHOUT a dash between `qwen` and `2` (qwen2-5-72b-instruct) where CP writes it WITH a dash (qwen-2-5-72b). Both refer to the same Qwen 2.5 72B Instruct model."

- cp_slug: qwen-2-5-coder-32b
  aa_slugs:
