repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.14
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: [--maxkb=5000]
      - id: check-merge-conflict
      - id: detect-private-key
      - id: mixed-line-ending

  # mypy via the project venv so the hook sees actual deps (httpx,
  # tenacity, fastmcp, etc.). The mirrors-mypy hook creates its own
  # isolated env and would force us to maintain `additional_dependencies`
  # in lockstep with pyproject.toml — easy to forget, slow to debug
  # (the failure looks like "Cannot find implementation or library stub
  # for module named X" after a new dep is added).
  - repo: local
    hooks:
      - id: mypy
        name: mypy (project venv)
        entry: uv run mypy
        language: system
        types: [python]
        files: ^src/
        pass_filenames: false
        args: [src]

  # Pre-push: full-repo gate that mirrors what CI checks. Catches the
  # "I forgot to stage file X" failure mode that ordinary pre-commit
  # cannot see (pre-commit hooks only run against staged files). Fires
  # once per `git push`, not per commit, so local rapid iteration stays
  # fast.
  - repo: local
    hooks:
      - id: ci-gate
        name: CI gate (ruff + mypy + pytest, full repo)
        entry: bash -c 'uv run ruff check . && uv run ruff format --check . && uv run mypy src && uv run pytest -q'
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]
