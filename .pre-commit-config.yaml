repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.14
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: [--maxkb=5000]
      - id: check-merge-conflict
      - id: detect-private-key
      - id: mixed-line-ending

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.13.0
    hooks:
      - id: mypy
        additional_dependencies:
          - pydantic>=2
          - types-pyyaml
        args: [--config-file=pyproject.toml]
        files: ^src/

  # Pre-push: full-repo gate that mirrors what CI checks. Catches the
  # "I forgot to stage file X" failure mode that ordinary pre-commit
  # cannot see (pre-commit hooks only run against staged files). Fires
  # once per `git push`, not per commit, so local rapid iteration stays
  # fast.
  - repo: local
    hooks:
      - id: ci-gate
        name: CI gate (ruff + mypy + pytest, full repo)
        entry: bash -c 'uv run ruff check . && uv run ruff format --check . && uv run mypy src && uv run pytest -q'
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]
