name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Format check (ruff)
        run: uv run ruff format --check .

      - name: Type check (mypy)
        run: uv run mypy src

      - name: Test (pytest)
        run: uv run pytest -ra
        env:
          # CI does not have real API keys — tests must use respx fixtures.
          # A test that calls a real upstream is a bug.
          COMPUTEPRICES_API_KEY: ""
          AA_API_KEY: ""
          HF_TOKEN: ""

  schema-evolution:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Schema-evolution tests
        # Per ADR-015, every upstream-data milestone has a test that proves
        # projection tolerates new upstream fields. This job runs them as a
        # separate gate so they never get silently skipped — empty
        # collection (exit 5) fails the build so the gate stays
        # meaningful as more milestones land.
        run: uv run pytest -m schema_evolution -ra
